<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="top-menu">
        <button class="active">Semua</button>
        <button>Musik</button>
        <button>Podcast</button>
    </div>

    <div class="playlist-grid">
        <div class="card">
            <img src="https://picsum.photos/100?1">
            <span>Mix 2K</span>
        </div>

        <div class="card">
            <img src="https://picsum.photos/100?2">
            <span>Radio Ichiko Aoba</span>
        </div>

        <div class="card">
            <img src="https://picsum.photos/100?3">
            <span>Mix Lily Chou-Chou</span>
        </div>

        <div class="card">
            <img src="https://picsum.photos/100?4">
            <span>Daily Mix 1</span>
        </div>
    </div>

    <h2>Stasiun Radio yang Direkomendasikan</h2>

    <div class="radio-list">

        <div class="radio-card">
            <img src="https://picsum.photos/300?5">
            <h3>グライド</h3>
            <p>Panchiko, Ichiko Aoba...</p>
        </div>

        <div class="radio-card">
            <img src="https://picsum.photos/300?6">
            <h3>her</h3>
            <p>JVKE, d4vd...</p>
        </div>

    </div>

</div>

<div class="player">
    <div class="song-info">
        <strong>Halfway Heart</strong>
        <small>Liana Flores</small>
    </div>

    <button id="playBtn">▶</button>
</div>

<script src="script.js"></script>

</body>
          </html>
